name: Update Dashboard

on:
  push:
    paths:
      - 'step-tracking_Team8.xlsx'

permissions:
  contents: write

jobs:
  regenerate-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Merge with existing spreadsheet data
        run: python merge_xlsx.py

      - name: Regenerate dashboard
        run: python dashboard_steps.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html step-tracking_Team8.xlsx
          git diff --cached --quiet || git commit -m "Auto-update dashboard from spreadsheet changes"
          git push
