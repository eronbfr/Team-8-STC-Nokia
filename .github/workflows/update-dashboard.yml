name: Update Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'step-tracking_Team8.xlsx'

permissions:
  contents: write

jobs:
  regenerate-dashboard:
    runs-on: ubuntu-latest
    # Skip when the push was made by the workflow itself
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verify spreadsheet exists
        run: |
          if [ ! -f step-tracking_Team8.xlsx ]; then
            echo "::error::step-tracking_Team8.xlsx not found in repository"
            exit 1
          fi
          echo "✅ step-tracking_Team8.xlsx found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Merge with existing spreadsheet data
        run: python merge_xlsx.py

      - name: Regenerate dashboard
        run: CI=true python dashboard_steps.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only add xlsx if the merge produced/modified it
          [ -f step-tracking_Team8.xlsx ] && git add step-tracking_Team8.xlsx || true
          git diff --cached --quiet || git commit -m "Auto-update dashboard from spreadsheet changes"
          git push
